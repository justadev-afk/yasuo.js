name: Publish

# Pushes to `main` publish to npm (no tests/lint here — those gate PRs in ci.yml).
on:
  push:
    branches: [main]

# One publish at a time; never cancel an in-flight release.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve package name and version
        id: pkg
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      # A push that doesn't bump the version (docs-only, dependabot, a revert)
      # must not fail the release: only publish when this version is new to npm.
      - name: Check whether the version is already on npm
        id: published
        run: |
          if npm view "${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${{ steps.pkg.outputs.name }}@${{ steps.pkg.outputs.version }} is already published — skipping publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        if: steps.published.outputs.exists == 'false'
        run: bun run build

      - name: Publish to npm
        if: steps.published.outputs.exists == 'false'
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > "$HOME/.npmrc"
          bun publish --access public --provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
