name: Publish

# Pushes to `main` publish to npm (no tests/lint here — those gate PRs in ci.yml).
on:
  push:
    branches: [main]

# One publish at a time; never cancel an in-flight release.
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # `bun publish` packs the package — running `prepublishOnly` (`bun run
      # build`) as it goes — then uploads it. `--tolerate-republish` makes a push
      # that didn't bump the version (docs-only, dependabot, a re-run) exit 0
      # instead of failing. Auth uses `NPM_CONFIG_TOKEN`, the env var bun
      # documents for CI/automation (writing an `.npmrc` by hand does not work).
      - name: Publish to npm
        run: bun publish --access public --tolerate-republish
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
