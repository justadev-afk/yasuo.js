name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: Typecheck · Lint · Unit · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Unit tests
        run: bun run test:unit

      - name: Build
        run: bun run build

  integration:
    name: Live integration tests
    runs-on: ubuntu-latest
    # Runs only where the RIOT_API_KEY secret is available (i.e. not on forks).
    env:
      RIOT_API_KEY: ${{ secrets.RIOT_API_KEY }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run live integration tests
        if: ${{ env.RIOT_API_KEY != '' }}
        run: bun run test:integration

      - name: Note when skipped
        if: ${{ env.RIOT_API_KEY == '' }}
        run: echo "RIOT_API_KEY not available (fork PR or missing secret) — integration tests skipped."
