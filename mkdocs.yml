site_name: Yasuo
site_description: >-
  The modern, zero-dependency TypeScript client for the Riot Games API —
  League of Legends, Teamfight Tactics and the Riot Account API.
site_url: https://docs.yasuo.gg/
site_author: justadev-afk

repo_name: justadev-afk/yasuo.js
repo_url: https://github.com/justadev-afk/yasuo.js
edit_uri: edit/main/docs/

copyright: Copyright &copy; justadev-afk — MIT licensed

theme:
  name: material
  language: en
  custom_dir: docs/overrides
  icon:
    repo: fontawesome/brands/github
    logo: material/sword-cross
  favicon: https://raw.githubusercontent.com/twitter/twemoji/master/assets/72x72/2694.png
  palette:
    # Dark (near-black + gray) is the default; toggle to light.
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: grey
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: grey
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Guides:
      - Entities & lazy relations: entities-and-relations.md
      - Rate limiting: rate-limiting.md
      - Transport & middleware: http-and-middleware.md
      - Caching: caching.md
      - Logging: logging.md
      - Pagination: pagination.md
      - Errors: errors.md
  - API reference:
      - Overview: api/index.md
      - League of Legends:
          - Summoner: api/lol-summoner.md
          - League: api/lol-league.md
          - Champion Mastery: api/lol-champion-mastery.md
          - Champion Rotation: api/lol-champion.md
          - Match: api/lol-match.md
          - Spectator: api/lol-spectator.md
          - Status: api/lol-status.md
          - Clash: api/lol-clash.md
          - Challenges: api/lol-challenges.md
      - Teamfight Tactics:
          - Summoner: api/tft-summoner.md
          - League: api/tft-league.md
          - Match: api/tft-match.md
          - Spectator: api/tft-spectator.md
      - Riot & static:
          - Account: api/riot-account.md
          - Data Dragon: api/data-dragon.md
      - Endpoint coverage: endpoints.md
  - Architecture: architecture.md
  - Migrating from twisted: migrating-from-twisted.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

# The theme override lives under docs/overrides so it isn't a stray root dir;
# exclude it from the page build so it isn't treated as documentation content.
exclude_docs: |
  overrides/

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/justadev-afk/yasuo.js
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/yasuo
